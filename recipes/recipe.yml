name: corvi
description: Ublue-OS based image with the Cosmic desktop environment.

base-image: ghcr.io/blue-build/base-images/fedora-cosmic
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:
      - cosmic-monitor
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - htop
        - nvtop
        - gnome-system-monitor

  - type: default-flatpaks
    configurations:
      - notify: false

  - type: signing
